<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CycleWorks – Book a service</title>
</head>
<body>
  <h1>CycleWorks – Book a service</h1>
  <form id="booking-form" method="post" action="">
    <p>
      <label for="city">City</label>
      <select id="city" name="city" required>
        <option value="">Select city</option>
        {% for city in cities %}
        <option value="{{ city }}">{{ city }}</option>
        {% endfor %}
      </select>
    </p>
    <p>
      <label for="service_date">Service date</label>
      <input type="date" id="service_date" name="service_date" required>
    </p>
    <p>
      <label for="slot_id">Time slot</label>
      <select id="slot_id" name="slot_id" required>
        <option value="">Select Time Slot</option>
      </select>
    </p>
    <p>
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>
    </p>
    <p>
      <label for="phone">Phone</label>
      <input type="tel" id="phone" name="phone" required>
    </p>
    <p>
      <label for="email">Email (optional)</label>
      <input type="email" id="email" name="email">
    </p>
    <p>
      <label for="address">Address</label>
      <input type="text" id="address" name="address" required>
    </p>
    <p>
      <label for="cycle_brand">Cycle brand (optional)</label>
      <input type="text" id="cycle_brand" name="cycle_brand">
    </p>
    <p>
      <label for="cycle_model">Cycle model (optional)</label>
      <input type="text" id="cycle_model" name="cycle_model">
    </p>
    <p>
      <button type="submit">Submit booking</button>
    </p>
  </form>

  <script>
(function () {
  var API_KEY = "dev-secret-key";
  var cityEl = document.getElementById("city");
  var dateEl = document.getElementById("service_date");
  var slotEl = document.getElementById("slot_id");

  function formatTime(s) {
    if (typeof s !== "string") return s;
    return s.length >= 5 ? s.substring(0, 5) : s;
  }

  function loadSlots() {
    var city = cityEl && cityEl.value;
    var date = dateEl && dateEl.value;
    if (!city || !date) {
      slotEl.innerHTML = '<option value="">Select Time Slot</option>';
      return;
    }
    var url = "/api/slots/available/?city=" + encodeURIComponent(city) + "&date=" + encodeURIComponent(date);
    fetch(url, {
      method: "GET",
      headers: { "X-API-KEY": API_KEY }
    })
      .then(function (res) {
        if (!res.ok) throw new Error("Request failed");
        return res.json();
      })
      .then(function (data) {
        slotEl.innerHTML = '<option value="">Select Time Slot</option>';
        if (!data || data.length === 0) {
          var opt = document.createElement("option");
          opt.value = "";
          opt.textContent = "No slots available for selected date";
          opt.disabled = true;
          slotEl.appendChild(opt);
          return;
        }
        data.forEach(function (slot) {
          var opt = document.createElement("option");
          opt.value = slot.slot_id;
          opt.textContent = formatTime(slot.start_time) + " - " + formatTime(slot.end_time) + " (" + slot.remaining_capacity + " slots left)";
          slotEl.appendChild(opt);
        });
      })
      .catch(function (err) {
        console.error(err);
        alert("Unable to load available slots. Please try again.");
        slotEl.innerHTML = '<option value="">Select Time Slot</option>';
      });
  }

  if (cityEl) cityEl.addEventListener("change", loadSlots);
  if (dateEl) dateEl.addEventListener("change", loadSlots);
})();
  </script>
</body>
</html>
